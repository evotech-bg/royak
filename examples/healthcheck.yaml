apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-healthy
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-healthy
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: worker
          image: alpine:latest
          command: ["sh", "-c", "touch /tmp/ready && while true; do sleep 30; done"]
          livenessProbe:
            exec:
              command: ["cat", "/tmp/ready"]
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["cat", "/tmp/ready"]
            initialDelaySeconds: 2
