apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: api
          image: python:3.12-alpine
          command: ["python3", "-m", "http.server", "8000"]
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: "web"
