# Simple nginx deployment.
#
# Deploy:  royak apply examples/nginx.yaml
# Check:   royak get pods
#          royak get deployments
# Export:  royak get deployment/web -o yaml
# Scale:   royak scale web 5
# Logs:    royak logs rk-web-1
# Delete:  royak delete deployment/web

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
