apiVersion: v1
kind: Namespace
metadata:
  name: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production
spec:
  APP_ENV: production
  APP_PORT: "8080"
  LOG_LEVEL: info
  DB_HOST: database
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: production
spec:
  DB_PASSWORD: supersecret123
  API_KEY: sk-neural-cloud-key
  JWT_SECRET: royak-jwt-token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: production
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: production
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: api
          image: python:3.12-alpine
          command: ["python3", "-m", "http.server", "8080"]
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: "backend-api"
