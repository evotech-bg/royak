apiVersion: v1
kind: PersistentVolume
metadata:
  name: data-volume
spec:
  capacity:
    storage: 10Gi
  storageClassName: local
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /tmp/royak-data
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: logs-volume
spec:
  capacity:
    storage: 5Gi
  storageClassName: local
  accessModes:
    - ReadWriteMany
  hostPath:
    path: /tmp/royak-logs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-data
  namespace: default
spec:
  storageClassName: local
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-logs
  namespace: default
spec:
  storageClassName: local
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: db
          image: alpine:latest
          command: ["sh", "-c", "echo 'data stored' > /data/test.txt && cat /data/test.txt && sleep 3600"]
          volumeMounts:
            - name: storage
              mountPath: /data
            - name: logs
              mountPath: /var/log
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: app-data
        - name: logs
          persistentVolumeClaim:
            claimName: app-logs
