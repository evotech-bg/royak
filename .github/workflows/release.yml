name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: royak-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            name: royak-linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: royak-macos-arm64
          # macOS Intel: cross-compiled on the arm64 runner (macos-13 Intel
          # runners are scarce/deprecated). The macos-latest toolchain ships
          # both slices, so `--target x86_64-apple-darwin` builds natively.
          - os: macos-latest
            target: x86_64-apple-darwin
            name: royak-macos-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Smoke test binary
        run: target/${{ matrix.target }}/release/royak --help

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/royak dist/
          cp README.md LICENSE dist/
          tar -czf ${{ matrix.name }}.tar.gz -C dist royak README.md LICENSE
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Royak ${GITHUB_REF_NAME}" \
            --prerelease \
            --generate-notes \
            royak-*.tar.gz royak-*.tar.gz.sha256
